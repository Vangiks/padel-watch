# Определение Xcode-проекта как код (XcodeGen).
# Генерация .xcodeproj:  xcodegen generate   (на macOS-раннере/облачном Mac)
# Это позволяет создавать и править проект без ручного Xcode — всё в этом YAML под git.
name: PadelWatch

options:
  bundleIdPrefix: com.example          # ЗАМЕНИ на свой (напр. com.digitalquarters)
  createIntermediateGroups: true
  deploymentTarget:
    watchOS: "10.0"                     # «свежий watchOS»; при желании поднять до 11/26

packages:
  ScoringEngine:
    path: ScoringEngine                 # локальный SwiftPM-пакет с логикой счёта

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Команда разработчика подставляется из окружения (CI-секрет / переменная).
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"

targets:
  PadelWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - App
    dependencies:
      - package: ScoringEngine
    # Info.plist для watch-only приложения генерируется XcodeGen при `xcodegen generate`.
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Padel
        WKApplication: true             # single-target watchOS app (Xcode 14+)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.padelwatch   # ЗАМЕНИ на свой
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Подпись на CI — ручная, профили выдаёт fastlane match (см. Fastfile).
        CODE_SIGN_STYLE: Manual
