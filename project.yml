# Определение Xcode-проекта как код (XcodeGen).
# Генерация .xcodeproj:  xcodegen generate   (на macOS-раннере/облачном Mac)
# Это позволяет создавать и править проект без ручного Xcode — всё в этом YAML под git.
name: PadelWatch

options:
  bundleIdPrefix: com.example          # ЗАМЕНИ на свой (напр. com.digitalquarters)
  createIntermediateGroups: true
  developmentLanguage: ru              # язык-источник строк (RU)
  knownRegions:
    - ru
    - en
  deploymentTarget:
    watchOS: "10.0"                     # «свежий watchOS»; при желании поднять до 11/26

packages:
  ScoringEngine:
    path: ScoringEngine                 # локальный SwiftPM-пакет с логикой счёта

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Команда разработчика подставляется из окружения (CI-секрет / переменная).
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"

targets:
  PadelWatchApp:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - App
    dependencies:
      - package: ScoringEngine
    # Info.plist для watch-only приложения генерируется XcodeGen при `xcodegen generate`.
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Vamos
        WKApplication: true             # single-target watchOS app (Xcode 14+)
        WKWatchOnly: true               # автономное watch-приложение без iOS-компаньона
        # HealthKit: тексты запроса доступа (обязательны при requestAuthorization).
        NSHealthShareUsageDescription: "Для подсчёта пульса и калорий во время матча."
        NSHealthUpdateUsageDescription: "Чтобы сохранить тренировку в приложение «Здоровье»."
        # Фоновый режим, чтобы workout-сессия продолжалась при опущенной руке.
        WKBackgroundModes:
          - workout-processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vyduikin.vamos   # при желании поменяй на свой
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Подпись на CI — ручная, профили выдаёт fastlane match (см. Fastfile).
        CODE_SIGN_STYLE: Manual
        # HealthKit-entitlement (требует включённой capability у App ID для device/TestFlight;
        # на симуляторе работает без провижининга).
        CODE_SIGN_ENTITLEMENTS: App/PadelWatchApp.entitlements
